# -------------------------------------------------
# Global defaults for all certificates except CACertificate (optional)
# -------------------------------------------------
[CertificatesDefaults] # No values are required
ValidDays = 20
RenewThresholdDays = 8     
OrganizationName = "Acme Corp"
Email = "admin@acme.example"

# -------------------------------------------------
# CA (root) certificate configuration
# -------------------------------------------------
[CACertificate]
Name = "RootCA" # required
Path = "./certs/CA/" # required
OrganizationName = "john doe CA" # required, has to be different from certificates OranizationName
Email = "johndoe@example.com" # required
ValidDays = 79000 # required
RenewThresholdDays = 30 # required

# -------------------------------------------------
# Individual ssl certificates
# -------------------------------------------------
[[Certificate]]
Name = "service‑frontend"
Path = "/etc/acme/pki/frontend" # path of folder where the certificate should be stored (cert.pem, key.pem)
IPs = ["10.0.0.12"] # IP the ssl cert is issued for
DNSNames = ["frontend.acme.example"] # DNS Nae the ssl cert is issued for

[[Certificate]]
Name = "service‑backend" # required
Path = "/etc/acme/pki/backend" # required
OrganizationName = "Acme Backend Team" # required
Email = "backend-admin@acme.example" # required
IPs = ["10.0.0.13", "10.0.0.14"] # required
DNSNames = ["backend.acme.example"] # required
# Initial validity of the certificat esince now
ValidDays = 20 # required
# If certificate remaining days is smaller than Renew Threshold, the certificate is renewed
RenewThresholdDays = 8 # required

# -------------------------------------------------
# Daemon configuration
# -------------------------------------------------
[Daemon]
# Renews certificates interval in days, is beeing used only in daemon mode
RenewIntervalDays = 7

[[Daemon.NotificationWebhook]]
# Name does not matter for now, it is not used in code yet
Name = "slack"
Url = "https://hooks.slack.com/services/some-other-stuff"
NotifyFail = true
NotifySuccess = false

# PostData is sended to the webhook, variables:
# %status% is either failed or success
# %message% is Certificates were renewed successfully (and list of names of renewed certficates)
PostData = { text = "ssl-manager %status% - %message%"}

